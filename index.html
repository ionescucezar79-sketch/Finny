<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brunnen Tagebuch — Güterplatz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0eeea;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --text: #1a1a18; --muted: #6b6a65; --hint: #a09f9a;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green: #3B6D11; --red: #A32D2D;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #252523; --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --text: #e8e7e2; --muted: #9a9991; --hint: #6b6a65;
      --blue: #378ADD; --blue-bg: #0c2a42; --blue-text: #85B7EB;
      --green: #97C459; --red: #E24B4A;
      --shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.08);
    }
  }
  body { font-family:-apple-system,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:1.5rem 1rem 3rem; }
  .container { max-width:1020px; margin:0 auto; }
  .page-header { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:1.5rem; }
  h1 { font-size:20px; font-weight:600; letter-spacing:-0.02em; }
  .sub { font-size:13px; color:var(--muted); margin-top:3px; }
  .badge { font-size:12px; padding:4px 12px; border-radius:999px; background:var(--blue-bg); color:var(--blue-text); font-weight:500; white-space:nowrap; margin-top:4px; }
  .card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:1.25rem; margin-bottom:1.25rem; }
  .card-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
  .toggle-btn { font-size:11px; font-weight:500; text-transform:none; letter-spacing:0; color:var(--blue); cursor:pointer; background:none; border:none; padding:0; height:auto; }
  .toggle-btn:hover { background:none; text-decoration:underline; }
  .meters-list { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; min-height:32px; align-items:center; }
  .meter-chip { display:inline-flex; align-items:center; gap:5px; background:var(--blue-bg); color:var(--blue-text); border-radius:999px; padding:5px 8px 5px 12px; font-size:13px; font-weight:500; }
  .chip-btn { background:none; border:none; cursor:pointer; color:var(--blue-text); opacity:0.45; font-size:13px; line-height:1; padding:2px; height:auto; display:flex; align-items:center; border-radius:50%; }
  .chip-btn:hover { opacity:1; background:rgba(0,0,0,0.08); transform:none; }
  .chip-edit { font-size:11px; }
  .add-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .add-row input { height:36px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 10px; font-size:13px; color:var(--text); background:var(--surface2); width:200px; font-family:inherit; transition:border-color .15s,box-shadow .15s; }
  .add-row input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(24,95,165,0.15); }
  .hint { font-size:11px; color:var(--hint); margin-top:8px; }
  .form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:10px; margin-bottom:12px; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .form-group input { height:38px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 10px; font-size:14px; color:var(--text); background:var(--surface2); font-family:'SF Mono','Fira Code',monospace; transition:border-color .15s,box-shadow .15s; width:100%; }
  .form-group input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(24,95,165,0.15); }
  input[type=date] { color:var(--text); font-family:-apple-system,'Segoe UI',system-ui,sans-serif; font-size:13px; }
  .note-row { margin-bottom:14px; }
  .note-row label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:5px; }
  .note-row input { width:100%; height:38px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 10px; font-size:13px; color:var(--text); background:var(--surface2); font-family:-apple-system,'Segoe UI',system-ui,sans-serif; transition:border-color .15s,box-shadow .15s; }
  .note-row input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(24,95,165,0.15); }
  .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
  button { height:36px; padding:0 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--text); font-family:inherit; transition:background .15s,transform .1s; white-space:nowrap; }
  button:hover { background:var(--surface2); }
  button:active { transform:scale(0.98); }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  button.primary { background:var(--blue); color:#E6F1FB; border-color:var(--blue); }
  button.primary:hover { filter:brightness(1.1); }
  button.success { background:var(--green); color:#fff; border-color:var(--green); }
  button.success:hover { filter:brightness(1.08); background:var(--green); }
  button.danger { color:var(--red); }
  button.export-btn { color:var(--muted); font-size:12px; }
  .table-wrap { overflow-x:auto; margin:0 -4px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th { padding:6px 8px; text-align:right; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; background:var(--surface); position:sticky; top:0; }
  thead th:first-child,thead th:nth-child(2) { text-align:left; }
  td { padding:8px 8px; text-align:right; border-bottom:1px solid var(--border); font-family:'SF Mono','Fira Code',monospace; font-size:12px; color:var(--text); white-space:nowrap; }
  td:first-child,td:nth-child(2) { font-family:inherit; text-align:left; }
  td.note-cell { font-family:inherit; font-size:11px; color:var(--muted); max-width:160px; overflow:hidden; text-overflow:ellipsis; }
  tr:last-child td { border-bottom:none; }
  tbody tr:hover td { background:var(--surface2); }
  .d-pos { color:var(--green); font-size:11px; }
  .d-neg { color:var(--red); font-size:11px; }
  .d-neu { color:var(--hint); font-size:11px; }
  .del-btn { background:none; border:none; cursor:pointer; color:var(--hint); font-size:13px; padding:0 4px; height:auto; line-height:1; }
  .del-btn:hover { color:var(--red); background:none; transform:none; }
  .empty { text-align:center; padding:2.5rem; color:var(--hint); font-size:13px; font-family:inherit; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px); background:#1a1a18; color:#e8e7e2; padding:10px 22px; border-radius:var(--radius-sm); font-size:13px; opacity:0; transition:opacity .25s,transform .25s; pointer-events:none; z-index:999; box-shadow:0 4px 16px rgba(0,0,0,0.3); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:1.25rem; }
  .stat-card { background:var(--surface); border-radius:var(--radius-sm); box-shadow:var(--shadow); padding:12px 14px; }
  .stat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:4px; }
  .stat-val { font-size:18px; font-weight:600; font-family:'SF Mono','Fira Code',monospace; color:var(--text); }
  .stat-diff { font-size:11px; margin-top:2px; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity .18s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border-radius:var(--radius); box-shadow:0 8px 32px rgba(0,0,0,0.22); padding:1.5rem; width:100%; max-width:340px; transform:translateY(8px); transition:transform .18s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal h2 { font-size:16px; font-weight:600; margin-bottom:1rem; }
  .modal .field { margin-bottom:1rem; }
  .modal .field label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:5px; }
  .modal .field input { width:100%; height:38px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 10px; font-size:14px; color:var(--text); background:var(--surface2); font-family:inherit; transition:border-color .15s,box-shadow .15s; }
  .modal .field input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(24,95,165,0.15); }
  .modal .btn-row { justify-content:flex-end; }
  @media (max-width:600px) { .form-grid { grid-template-columns:repeat(3,1fr); } h1 { font-size:17px; } }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div>
      <h1>Güterplatz — Brunnen Tagebuch</h1>
      <div class="sub">Registru zilnic citiri contoare apă</div>
    </div>
    <span class="badge" id="entry-count">0 înregistrări</span>
  </div>
  <div class="stats-row" id="stats-row" style="display:none"></div>
  <div class="card">
    <div class="card-title">
      ⚙ Apometre configurate
      <button class="toggle-btn" id="toggle-btn" onclick="toggleMeters()">Ascunde</button>
    </div>
    <div id="meters-body">
      <div class="meters-list" id="meters-list"></div>
      <div class="add-row">
        <input type="text" id="new-meter-input" placeholder="ex: Br. 35, Etaj, Curte…" maxlength="30">
        <button class="success" onclick="addMeter()">＋ Adaugă apometru</button>
      </div>
      <div class="hint">Apometrele apar automat în formular, tabel și statistici.</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Citire nouă</div>
    <div class="form-grid" id="form-grid">
      <div class="form-group"><label>Datum</label><input type="date" id="f-datum"></div>
      <div class="form-group"><label>Uhr</label><input type="time" id="f-uhr"></div>
    </div>
    <div class="note-row">
      <label>Bemerkung / Observații</label>
      <input type="text" id="f-note" placeholder="ex: wz gereinigt, neue WZ gebaut...">
    </div>
    <div class="btn-row">
      <button class="primary" id="btn-save" onclick="saveEntry()">＋ Salvează</button>
      <button onclick="clearForm()">Resetează</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">
      <span>Istoric înregistrări <span style="color:var(--hint);font-weight:400;text-transform:none;letter-spacing:0">(cel mai recent în vârf)</span></span>
      <div style="display:flex;gap:6px">
        <button class="export-btn" onclick="exportCSV()" style="height:28px;font-size:11px">↓ CSV</button>
        <button class="export-btn" onclick="exportJSON()" style="height:28px;font-size:11px">↓ Backup</button>
        <label style="height:28px;display:inline-flex;align-items:center;padding:0 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:11px;color:var(--muted);cursor:pointer;font-weight:500;white-space:nowrap">
          ↑ Import <input type="file" accept=".json" onchange="importJSON(event)" style="display:none">
        </label>
        <button class="export-btn danger" onclick="clearAll()" style="height:28px;font-size:11px">✕ Șterge tot</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="tbl-head"></thead>
        <tbody id="tbl-body">
          <tr><td class="empty">Nicio înregistrare. Adaugă prima citire!</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<div class="modal-overlay" id="edit-modal" onclick="modalBg(event)">
  <div class="modal">
    <h2>Redenumește apometru</h2>
    <div class="field">
      <label>Nume nou</label>
      <input type="text" id="edit-input" maxlength="30">
    </div>
    <div class="btn-row">
      <button onclick="closeModal()">Anulează</button>
      <button class="primary" onclick="confirmEdit()">Salvează</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY_E='brunnen-entries',KEY_M='brunnen-meters-v2';
const DEFAULT_METERS=[{id:'br20',label:'Br. 20'},{id:'br21',label:'Br. 21'},{id:'br23',label:'Br. 23'},{id:'br24',label:'Br. 24'},{id:'br33',label:'Br. 33'}];
let entries=[],meters=[],metersOpen=true,editId=null;
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>{ try{ const[y,m,d]=iso.split('-'); return`${d}.${m}.${y}`; }catch(e){ return iso||''; } };
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=v=>(v===''||v==null)?'—':(isNaN(Number(v))?String(v):Number(v).toLocaleString('de-DE'));
function diffCell(v,p){if(v===''||v==null||p===''||p==null)return'<td class="d-neu">—</td>';const d=Number(v)-Number(p);if(isNaN(d))return'<td>—</td>';const cls=d>0?'d-pos':d<0?'d-neg':'d-neu';return`<td class="${cls}">${d>0?'+':''}${d.toLocaleString('de-DE')}</td>`;}
function saveEntries(){try{localStorage.setItem(KEY_E,JSON.stringify(entries));}catch(e){showToast('⚠ Eroare stocare!');}}
function saveMeters(){try{localStorage.setItem(KEY_M,JSON.stringify(meters));}catch(e){showToast('⚠ Eroare stocare!');}}
function load(){try{const r=localStorage.getItem(KEY_M);meters=r?JSON.parse(r):DEFAULT_METERS;}catch(e){meters=DEFAULT_METERS;}try{const r=localStorage.getItem(KEY_E);entries=r?JSON.parse(r):[];}catch(e){entries=[];}renderAll();}
function renderAll(){renderChips();renderForm();renderHead();renderBody();renderStats();}
function renderChips(){const list=$('meters-list');if(!meters.length){list.innerHTML='<span style="font-size:12px;color:var(--hint)">Niciun apometru configurat.</span>';return;}list.innerHTML=meters.map(m=>`<span class="meter-chip">${esc(m.label)}<button class="chip-btn chip-edit" onclick="openModal('${esc(m.id)}')" title="Redenumește">✎</button><button class="chip-btn" onclick="removeMeter('${esc(m.id)}')" title="Șterge" style="font-size:15px">×</button></span>`).join('');}
function renderForm(){$('form-grid').innerHTML=`<div class="form-group"><label>Datum</label><input type="date" id="f-datum"></div><div class="form-group"><label>Uhr</label><input type="time" id="f-uhr"></div>${meters.map(m=>`<div class="form-group"><label title="${esc(m.label)}">${esc(m.label)}</label><input type="number" id="f-${esc(m.id)}" placeholder="—"></div>`).join('')}`;$('f-datum').value=today();}
function renderHead(){$('tbl-head').innerHTML=`<tr><th>Datum</th><th>Uhr</th>${meters.map(m=>`<th>${esc(m.label)}</th><th>Δ</th>`).join('')}<th>Bemerkung</th><th></th></tr>`;}
function renderBody(){$('entry-count').textContent=entries.length+' înregistrări';const body=$('tbl-body'),cols=2+meters.length*2+2;if(!entries.length){body.innerHTML=`<tr><td colspan="${cols}" class="empty">Nicio înregistrare. Adaugă prima citire!</td></tr>`;return;}body.innerHTML=[...entries].reverse().map((e,ri)=>{const oi=entries.length-1-ri,prev=oi>0?entries[oi-1]:null;return`<tr><td>${e.datum}</td><td>${e.uhr||'—'}</td>${meters.map(m=>`<td>${fmt(e[m.id])}</td>${diffCell(e[m.id],prev?.[m.id])}`).join('')}<td class="note-cell" title="${esc(e.note)}">${esc(e.note)}</td><td><button class="del-btn" onclick="delEntry(${oi})" title="Șterge">✕</button></td></tr>`;}).join('');}
function renderStats(){const row=$('stats-row');if(!entries.length||!meters.length){row.style.display='none';return;}const last=entries[entries.length-1],prev=entries.length>1?entries[entries.length-2]:null;row.style.display='grid';row.innerHTML=meters.map(m=>{const v=last[m.id],p=prev?.[m.id];let dh='';if(v!==''&&v!=null&&p!=null&&p!==''){const d=Number(v)-Number(p);if(!isNaN(d)){const cls=d>0?'d-pos':d<0?'d-neg':'d-neu';dh=`<div class="stat-diff ${cls}">${d>0?'+':''}${d.toLocaleString('de-DE')} față de anterior</div>`;}}return`<div class="stat-card"><div class="stat-label">${esc(m.label)}</div><div class="stat-val">${fmt(v)}</div>${dh}</div>`;}).join('');}
function addMeter(){const inp=$('new-meter-input'),label=inp.value.trim();if(!label){inp.focus();showToast('Introdu un nume!');return;}if(meters.some(m=>m.label.toLowerCase()===label.toLowerCase())){showToast('Există deja un apometru cu acest nume!');return;}meters.push({id:'m_'+Date.now(),label});saveMeters();inp.value='';renderAll();showToast(`✓ Apometru "${label}" adăugat!`);}
function removeMeter(id){const m=meters.find(x=>x.id===id);if(!m)return;const cnt=entries.filter(e=>e[id]!==''&&e[id]!=null).length;if(!confirm(cnt?`Ștergi apometrul "${m.label}"?\n\n${cnt} înregistrări conțin date pentru el.`:`Ștergi apometrul "${m.label}"?`))return;meters=meters.filter(x=>x.id!==id);saveMeters();renderAll();showToast(`Apometru "${m.label}" șters.`);}
function openModal(id){const m=meters.find(x=>x.id===id);if(!m)return;editId=id;$('edit-input').value=m.label;$('edit-modal').classList.add('open');setTimeout(()=>$('edit-input').select(),60);}
function closeModal(){$('edit-modal').classList.remove('open');editId=null;}
function modalBg(e){if(e.target===$('edit-modal'))closeModal();}
function confirmEdit(){const label=$('edit-input').value.trim();if(!label){$('edit-input').focus();return;}const m=meters.find(x=>x.id===editId);if(!m)return;if(meters.some(x=>x.id!==editId&&x.label.toLowerCase()===label.toLowerCase())){showToast('Există deja un apometru cu acest nume!');return;}m.label=label;saveMeters();closeModal();renderAll();showToast('✓ Redenumit!');}
function toggleMeters(){metersOpen=!metersOpen;$('meters-body').style.display=metersOpen?'':'none';$('toggle-btn').textContent=metersOpen?'Ascunde':'Arată';}
function saveEntry(){const btn=$('btn-save');btn.disabled=true;btn.textContent='…';const entry={datum:fmtDate($('f-datum').value),uhr:$('f-uhr').value,note:$('f-note').value.trim(),ts:Date.now()};meters.forEach(m=>{const el=$('f-'+m.id);entry[m.id]=el?el.value:'';});entries.push(entry);saveEntries();renderBody();renderStats();clearForm();showToast('✓ Înregistrare salvată!');btn.disabled=false;btn.textContent='＋ Salvează';}
function clearForm(){$('f-uhr').value='';$('f-note').value='';meters.forEach(m=>{const el=$('f-'+m.id);if(el)el.value='';});$('f-datum').value=today();$('f-uhr').focus();}
function delEntry(idx){if(!confirm('Ștergi această înregistrare?'))return;entries.splice(idx,1);saveEntries();renderBody();renderStats();showToast('Intrare ștearsă.');}
function clearAll(){if(!confirm('Ștergi TOATE înregistrările? Ireversibil!'))return;entries=[];saveEntries();renderBody();renderStats();showToast('Toate datele au fost șterse.');}
function exportCSV(){if(!entries.length){showToast('Nicio dată de exportat!');return;}const hdr=['Datum','Uhr',...meters.map(m=>m.label),'Bemerkung'].join(';')+'\n';const rows=entries.map(e=>[e.datum,e.uhr||'',...meters.map(m=>e[m.id]||''),e.note||''].join(';')).join('\n');download('\uFEFF'+hdr+rows,'text/csv','brunnen-tagebuch-'+stamp()+'.csv');showToast('CSV exportat!');}
function exportJSON(){const data={version:1,exportedAt:new Date().toISOString(),meters,entries};download(JSON.stringify(data,null,2),'application/json','brunnen-backup-'+stamp()+'.json');showToast('Backup exportat!');}
function importJSON(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.entries||!data.meters)throw new Error();const mode=confirm(`Fișier: ${file.name}\n${data.entries.length} înregistrări, ${data.meters.length} apometre.\n\nOK = Înlocuiește tot\nAnulare = Adaugă peste`);if(mode){entries=data.entries;meters=data.meters;}else{data.meters.forEach(m=>{if(!meters.find(x=>x.id===m.id))meters.push(m);});const ex=new Set(entries.map(e=>e.ts));data.entries.forEach(e=>{if(!ex.has(e.ts))entries.push(e);});entries.sort((a,b)=>a.ts-b.ts);}saveEntries();saveMeters();renderAll();showToast(`✓ Import reușit: ${data.entries.length} înregistrări!`);}catch(err){showToast('⚠ Fișier invalid!');}event.target.value='';};reader.readAsText(file);}
function download(content,mime,filename){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
function stamp(){return new Date().toISOString().slice(0,10);}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
load();
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')saveEntry();if(e.key==='Escape')closeModal();});
$('new-meter-input').addEventListener('keydown',e=>{if(e.key==='Enter')addMeter();});
$('edit-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmEdit();});
